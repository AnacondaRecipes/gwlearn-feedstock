{% set name = "gwlearn" %}
{% set python_min = "3.11" %}
{% set version = "0.0.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/gwlearn-{{ version }}.tar.gz
  sha256: 4db920b6518174ae554e81eb429f3310ec3b5e3f049c40fe3c1bbf61f8f3e966

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - setuptools-scm >=6.2
    - pip
  run:
    - python >={{ python_min }}
    - geopandas >=1.0.0
    - joblib >=1.4.0
    - libpysal >=4.12
    - numpy >=1.26.0
    - scipy >=1.12.0
    - scikit-learn >=1.4.0
    - pandas >=2.1.0

test:
  imports:
    - gwlearn
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://pysal.org
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Geographically weighted modelling based on scikit-learn

extra:
  recipe-maintainers:
    - martinfleis
    - jGaboardi
